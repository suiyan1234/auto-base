<!DOCTYPE html>
<html>

<head>

<title>Auto Team Hub</title>

<link rel="stylesheet" href="css/style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<h1>QA Dashboard</h1>

<div class="cards">

<div class="card">
<h3>Total CASE</h3>
<p id="caseTotal"></p>
</div>

<div class="card">
<h3>Pass Rate</h3>
<p id="passRate"></p>
</div>

<div class="card">
<h3>Automation</h3>
<p id="autoRate"></p>
</div>

<div class="card">
<h3>Open Bugs</h3>
<p id="openBug"></p>
</div>

</div>

<table>

<thead>

<tr>
<th>Module</th>
<th>Owner</th>
<th>CASE</th>
<th>PASS</th>
<th>FAIL</th>
<th>Automation</th>
<th>Bug</th>
<th>Status</th>
</tr>

</thead>

<tbody id="tableBody"></tbody>

</table>

<script src="js/supabase.js"></script>
<script src="js/dashboard.js"></script>

</body>

</html>
