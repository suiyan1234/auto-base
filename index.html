<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Team Hub - 项目看板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .card-hover { transition: all 0.3s ease; }
        .card-hover:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- 导航栏 -->
    <nav class="gradient-bg text-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center space-x-3">
                    <div class="w-10 h-10 bg-white rounded-lg flex items-center justify-center text-purple-600 font-bold text-xl">A</div>
                    <span class="font-bold text-xl">Auto Team Hub</span>
                </div>
                <div class="flex items-center space-x-4">
                    <span id="user-status" class="text-sm opacity-80">访客模式</span>
                    <button onclick="checkLogin()" class="bg-white text-purple-600 px-4 py-2 rounded-lg font-medium hover:bg-gray-100 transition">
                        管理员登录
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- 主要内容 -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- 统计卡片 -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
            <div class="bg-white rounded-xl shadow-md p-6 card-hover">
                <div class="text-sm text-gray-500 mb-1">总项目数</div>
                <div class="text-3xl font-bold text-gray-800" id="total-projects">-</div>
            </div>
            <div class="bg-white rounded-xl shadow-md p-6 card-hover">
                <div class="text-sm text-gray-500 mb-1">总Case数</div>
                <div class="text-3xl font-bold text-blue-600" id="total-cases">-</div>
            </div>
            <div class="bg-white rounded-xl shadow-md p-6 card-hover">
                <div class="text-sm text-gray-500 mb-1">完成率</div>
                <div class="text-3xl font-bold text-green-600" id="completion-rate">-</div>
            </div>
            <div class="bg-white rounded-xl shadow-md p-6 card-hover">
                <div class="text-sm text-gray-500 mb-1">自动化率</div>
                <div class="text-3xl font-bold text-purple-600" id="auto-rate">-</div>
            </div>
        </div>

        <!-- 图表区域 -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
            <div class="bg-white rounded-xl shadow-md p-6">
                <h3 class="text-lg font-bold text-gray-800 mb-4">各Function完成情况</h3>
                <canvas id="completionChart"></canvas>
            </div>
            <div class="bg-white rounded-xl shadow-md p-6">
                <h3 class="text-lg font-bold text-gray-800 mb-4">自动化覆盖情况</h3>
                <canvas id="autoChart"></canvas>
            </div>
        </div>

        <!-- 项目列表 -->
        <div class="bg-white rounded-xl shadow-md overflow-hidden">
            <div class="px-6 py-4 border-b border-gray-200 flex justify-between items-center">
                <h3 class="text-lg font-bold text-gray-800">项目详情</h3>
                <span class="text-sm text-gray-500">实时数据</span>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">项目名称</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Function</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Case进度</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">自动化</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">状态</th>
                        </tr>
                    </thead>
                    <tbody id="projects-table" class="divide-y divide-gray-200">
                        <tr><td colspan="5" class="px-6 py-4 text-center text-gray-500">加载中...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        // ==================== 配置区域 ====================
        const SUPABASE_URL = 'https://mjyebsvoppkzybetpvsx.supabase.co/';
        const SUPABASE_KEY = 'sb_publishable_Fb7b28n0syJAuDwIM97HWg_ixg3dU0m';
        // =================================================

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let completionChart, autoChart;

        // 检查登录状态
        async function checkLogin() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                const { data: profile } = await supabase
                    .from('profiles')
                    .select('role')
                    .eq('id', session.user.id)
                    .single();
                
                if (profile?.role === 'admin') {
                    window.location.href = 'admin.html';
                    return;
                }
            }
            window.location.href = 'login.html';
        }

        // 加载数据
        async function loadData() {
            const { data: projects, error } = await supabase
                .from('projects')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                console.error('加载失败:', error);
                return;
            }

            updateStats(projects);
            renderTable(projects);
            renderCharts(projects);
        }

        // 更新统计卡片
        function updateStats(projects) {
            const totalProjects = projects.length;
            const totalCases = projects.reduce((sum, p) => sum + p.total_cases, 0);
            const completedCases = projects.reduce((sum, p) => sum + p.completed_cases, 0);
            const autoCases = projects.reduce((sum, p) => sum + p.auto_cases, 0);

            document.getElementById('total-projects').textContent = totalProjects;
            document.getElementById('total-cases').textContent = totalCases;
            document.getElementById('completion-rate').textContent = 
                totalCases ? Math.round((completedCases / totalCases) * 100) + '%' : '0%';
            document.getElementById('auto-rate').textContent = 
                completedCases ? Math.round((autoCases / completedCases) * 100) + '%' : '0%';
        }

        // 渲染表格
        function renderTable(projects) {
            const tbody = document.getElementById('projects-table');
            tbody.innerHTML = projects.map(p => `
                <tr class="hover:bg-gray-50">
                    <td class="px-6 py-4 font-medium text-gray-900">${p.name}</td>
                    <td class="px-6 py-4 text-gray-600">${p.function_name}</td>
                    <td class="px-6 py-4">
                        <div class="flex items-center">
                            <div class="w-16 bg-gray-200 rounded-full h-2 mr-2">
                                <div class="bg-blue-600 h-2 rounded-full" style="width: ${(p.completed_cases/p.total_cases*100)||0}%"></div>
                            </div>
                            <span class="text-sm text-gray-600">${p.completed_cases}/${p.total_cases}</span>
                        </div>
                    </td>
                    <td class="px-6 py-4">
                        <div class="flex items-center">
                            <div class="w-16 bg-gray-200 rounded-full h-2 mr-2">
                                <div class="bg-purple-600 h-2 rounded-full" style="width: ${(p.auto_cases/p.completed_cases*100)||0}%"></div>
                            </div>
                            <span class="text-sm text-gray-600">${p.auto_cases}/${p.completed_cases}</span>
                        </div>
                    </td>
                    <td class="px-6 py-4">
                        <span class="px-2 py-1 text-xs rounded-full ${
                            p.status === '已完成' ? 'bg-green-100 text-green-800' : 
                            p.status === '进行中' ? 'bg-yellow-100 text-yellow-800' : 
                            'bg-gray-100 text-gray-800'
                        }">${p.status}</span>
                    </td>
                </tr>
            `).join('');
        }

        // 渲染图表
        function renderCharts(projects) {
            const labels = projects.map(p => p.function_name);
            const completed = projects.map(p => p.completed_cases);
            const auto = projects.map(p => p.auto_cases);

            if (completionChart) completionChart.destroy();
            if (autoChart) autoChart.destroy();

            completionChart = new Chart(document.getElementById('completionChart'), {
                type: 'bar',
                data: {
                    labels,
                    datasets: [{
                        label: '已完成Case',
                        data: completed,
                        backgroundColor: 'rgba(59, 130, 246, 0.8)'
                    }]
                },
                options: { responsive: true, scales: { y: { beginAtZero: true } } }
            });

            autoChart = new Chart(document.getElementById('autoChart'), {
                type: 'doughnut',
                data: {
                    labels: ['已自动化', '未自动化'],
                    datasets: [{
                        data: [
                            auto.reduce((a,b)=>a+b,0),
                            completed.reduce((a,b)=>a+b,0) - auto.reduce((a,b)=>a+b,0)
                        ],
                        backgroundColor: ['rgba(147, 51, 234, 0.8)', 'rgba(229, 231, 235, 0.8)']
                    }]
                },
                options: { responsive: true }
            });
        }

        // 实时订阅（数据变化自动刷新）
        supabase
            .channel('public:projects')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'projects' }, payload => {
                console.log('数据更新:', payload);
                loadData();
            })
            .subscribe();

        // 初始化
        loadData();
    </script>
</body>
</html>
