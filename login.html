<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录 - Auto Team Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gradient-to-br from-purple-600 to-blue-600 min-h-screen flex items-center justify-center">
    <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md mx-4">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-purple-600 rounded-xl flex items-center justify-center text-white font-bold text-2xl mx-auto mb-4">A</div>
            <h2 class="text-2xl font-bold text-gray-800">管理员登录</h2>
            <p class="text-gray-500 mt-2">Auto Team Hub 管理系统</p>
        </div>

        <form id="login-form" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">邮箱地址</label>
                <input type="email" id="email" required 
                    class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-purple-500 focus:border-transparent outline-none transition"
                    placeholder="admin@example.com">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">密码</label>
                <input type="password" id="password" required 
                    class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-purple-500 focus:border-transparent outline-none transition"
                    placeholder="••••••••">
            </div>
            <button type="submit" 
                class="w-full bg-purple-600 text-white py-3 rounded-lg font-medium hover:bg-purple-700 transition transform hover:scale-[1.02]">
                登录
            </button>
        </form>

        <div id="error-msg" class="mt-4 p-3 bg-red-50 text-red-600 rounded-lg text-sm hidden"></div>
        
        <div class="mt-6 text-center text-sm text-gray-500">
            <a href="index.html" class="text-purple-600 hover:underline">← 返回访客页面</a>
        </div>
    </div>

    <script>
        // ==================== 配置区域（与index.html相同） ====================
        const SUPABASE_URL = 'https://mjyebsvoppkzybetpvsx.supabase.co/';
        const SUPABASE_KEY = 'sb_publishable_Fb7b28n0syJAuDwIM97HWg_ixg3dU0m';
        // ================================================================

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');

            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email,
                    password
                });

                if (error) throw error;

                // 检查是否为管理员
                const { data: profile, error: profileError } = await supabase
                    .from('profiles')
                    .select('role')
                    .eq('id', data.user.id)
                    .single();

                if (profileError || profile.role !== 'admin') {
                    await supabase.auth.signOut();
                    throw new Error('您没有管理员权限');
                }

                // 登录成功，跳转到管理后台
                window.location.href = 'admin.html';

            } catch (err) {
                errorMsg.textContent = err.message;
                errorMsg.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
