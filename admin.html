<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - Auto Team Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <!-- 顶部栏 -->
    <nav class="bg-white shadow-sm border-b">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center space-x-4">
                    <h1 class="text-xl font-bold text-gray-800">管理后台</h1>
                    <span class="px-2 py-1 bg-purple-100 text-purple-700 text-xs rounded-full">管理员</span>
                </div>
                <div class="flex items-center space-x-4">
                    <span id="admin-email" class="text-sm text-gray-600"></span>
                    <button onclick="logout()" class="text-red-600 hover:text-red-700 text-sm font-medium">
                        退出登录
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- 操作栏 -->
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-lg font-bold text-gray-800">项目管理</h2>
            <button onclick="openModal()" class="bg-purple-600 text-white px-4 py-2 rounded-lg hover:bg-purple-700 transition flex items-center space-x-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                <span>新增项目</span>
            </button>
        </div>

        <!-- 数据表格 -->
        <div class="bg-white rounded-xl shadow-md overflow-hidden">
            <table class="w-full">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">项目名称</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Function</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">总Case</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">已完成</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">自动化</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">状态</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">操作</th>
                    </tr>
                </thead>
                <tbody id="admin-table" class="divide-y divide-gray-200">
                    <tr><td colspan="7" class="px-6 py-4 text-center">加载中...</td></tr>
                </tbody>
            </table>
        </div>

        <!-- 实时预览提示 -->
        <div class="mt-4 p-4 bg-blue-50 rounded-lg flex items-center space-x-2 text-blue-700">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <span class="text-sm">提示：访客页面会实时同步这些修改，无需刷新</span>
        </div>
    </main>

    <!-- 新增/编辑弹窗 -->
    <div id="modal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-lg mx-4 p-6">
            <h3 id="modal-title" class="text-lg font-bold text-gray-800 mb-4">新增项目</h3>
            <form id="project-form" class="space-y-4">
                <input type="hidden" id="project-id">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">项目名称</label>
                    <input type="text" id="project-name" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-purple-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Function名称</label>
                    <input type="text" id="function-name" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-purple-500 outline-none">
                </div>
                <div class="grid grid-cols-3 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">总Case数</label>
                        <input type="number" id="total-cases" required min="0" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-purple-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">已完成</label>
                        <input type="number" id="completed-cases" required min="0" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-purple-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">自动化</label>
                        <input type="number" id="auto-cases" required min="0" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-purple-500 outline-none">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">状态</label>
                    <select id="status" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-purple-500 outline-none">
                        <option value="进行中">进行中</option>
                        <option value="已完成">已完成</option>
                        <option value="暂停">暂停</option>
                    </select>
                </div>
                <div class="flex justify-end space-x-3 mt-6">
                    <button type="button" onclick="closeModal()" class="px-4 py-2 text-gray-600 hover:text-gray-800">取消</button>
                    <button type="submit" class="px-4 py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700">保存</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // ==================== 配置区域（与前两个文件相同） ====================
        const SUPABASE_URL = 'https://mjyebsvoppkzybetpvsx.supabase.co/
';
        const SUPABASE_KEY = 'sb_publishable_Fb7b28n0syJAuDwIM97HWg_ixg3dU0m';
        // ================================================================

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let currentUser = null;

        // 检查登录状态
        async function checkAuth() {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) {
                window.location.href = 'login.html';
                return;
            }

            const { data: profile } = await supabase
                .from('profiles')
                .select('role, email')
                .eq('id', session.user.id)
                .single();

            if (!profile || profile.role !== 'admin') {
                await supabase.auth.signOut();
                window.location.href = 'login.html';
                return;
            }

            currentUser = session.user;
            document.getElementById('admin-email').textContent = profile.email;
            loadProjects();
        }

        // 加载项目列表
        async function loadProjects() {
            const { data: projects, error } = await supabase
                .from('projects')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                alert('加载失败: ' + error.message);
                return;
            }

            const tbody = document.getElementById('admin-table');
            tbody.innerHTML = projects.map(p => `
                <tr class="hover:bg-gray-50">
                    <td class="px-6 py-4 font-medium">${p.name}</td>
                    <td class="px-6 py-4 text-gray-600">${p.function_name}</td>
                    <td class="px-6 py-4">${p.total_cases}</td>
                    <td class="px-6 py-4">${p.completed_cases}</td>
                    <td class="px-6 py-4">${p.auto_cases}</td>
                    <td class="px-6 py-4">
                        <span class="px-2 py-1 text-xs rounded-full ${
                            p.status === '已完成' ? 'bg-green-100 text-green-800' : 
                            p.status === '进行中' ? 'bg-yellow-100 text-yellow-800' : 
                            'bg-gray-100 text-gray-800'
                        }">${p.status}</span>
                    </td>
                    <td class="px-6 py-4 space-x-2">
                        <button onclick="editProject('${p.id}', '${p.name}', '${p.function_name}', ${p.total_cases}, ${p.completed_cases}, ${p.auto_cases}, '${p.status}')" 
                            class="text-blue-600 hover:text-blue-800 text-sm">编辑</button>
                        <button onclick="deleteProject('${p.id}')" 
                            class="text-red-600 hover:text-red-800 text-sm">删除</button>
                    </td>
                </tr>
            `).join('');
        }

        // 打开弹窗
        function openModal() {
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('modal').classList.add('flex');
            document.getElementById('modal-title').textContent = '新增项目';
            document.getElementById('project-form').reset();
            document.getElementById('project-id').value = '';
        }

        // 关闭弹窗
        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
            document.getElementById('modal').classList.remove('flex');
        }

        // 编辑项目
        function editProject(id, name, func, total, completed, auto, status) {
            openModal();
            document.getElementById('modal-title').textContent = '编辑项目';
            document.getElementById('project-id').value = id;
            document.getElementById('project-name').value = name;
            document.getElementById('function-name').value = func;
            document.getElementById('total-cases').value = total;
            document.getElementById('completed-cases').value = completed;
            document.getElementById('auto-cases').value = auto;
            document.getElementById('status').value = status;
        }

        // 保存项目
        document.getElementById('project-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const id = document.getElementById('project-id').value;
            const data = {
                name: document.getElementById('project-name').value,
                function_name: document.getElementById('function-name').value,
                total_cases: parseInt(document.getElementById('total-cases').value),
                completed_cases: parseInt(document.getElementById('completed-cases').value),
                auto_cases: parseInt(document.getElementById('auto-cases').value),
                status: document.getElementById('status').value
            };

            try {
                if (id) {
                    // 更新
                    const { error } = await supabase
                        .from('projects')
                        .update(data)
                        .eq('id', id);
                    if (error) throw error;
                } else {
                    // 新增
                    const { error } = await supabase
                        .from('projects')
                        .insert([data]);
                    if (error) throw error;
                }

                closeModal();
                loadProjects();
                // 实时同步到访客页面（通过Supabase实时订阅自动完成）

            } catch (err) {
                alert('保存失败: ' + err.message);
            }
        });

        // 删除项目
        async function deleteProject(id) {
            if (!confirm('确定要删除这个项目吗？')) return;

            try {
                const { error } = await supabase
                    .from('projects')
                    .delete()
                    .eq('id', id);
                if (error) throw error;
                loadProjects();
            } catch (err) {
                alert('删除失败: ' + err.message);
            }
        }

        // 退出登录
        async function logout() {
            await supabase.auth.signOut();
            window.location.href = 'login.html';
        }

        // 初始化
        checkAuth();
    </script>
</body>
</html>
